<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Maintenance Logbook</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <img src="/static/images/nash-logo.svg" alt="Demo Company">
        <div class="login-divider"></div>
        <p>Maintenance Management System</p>
      </div>

      <div class="login-error" id="login-error"></div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" id="username" placeholder="Enter your username" required autofocus>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary w-full" style="justify-content:center; padding:10px; font-size:14px;" id="login-btn">
          Sign In
        </button>
      </form>

      <p style="text-align:center; margin-top:18px; font-size:12px; color:var(--text-muted);">
        Default admin: <strong>admin</strong> / <strong>admin123</strong>
      </p>
    </div>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const errorBox = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.style.display = 'none';
      btn.textContent = 'Signing in…';
      btn.disabled = true;

      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value.trim(),
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();

      if (res.ok && data.success) {
        window.location.href = data.redirect;
      } else {
        errorBox.textContent = data.error || 'Login failed.';
        errorBox.style.display = 'block';
        btn.textContent = 'Sign In';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
